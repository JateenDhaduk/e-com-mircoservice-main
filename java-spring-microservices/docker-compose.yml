version: '3.8'

services:
  # --- Databases ---
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecom-network
    restart: unless-stopped

  # --- Message Broker ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - ecom-network
    restart: unless-stopped

  # --- Core Infrastructure Services ---
  discovery-service:
    build:
      context: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - ecom-network
    restart: on-failure

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - AUTH_SERVICE_URL=http://user-service:8081
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
      - user-service
    networks:
      - ecom-network
    restart: on-failure

  # --- Business Services ---
  user-service:
    build:
      context: ./user-service
    container_name: user-service
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JWT_SECRET=bXlTZWNyZXRLZXlGb3JKd3RBdXRoMTIzNDU2Nzg5MCEh
      - JWT_EXPIRATION=86400000
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - discovery-service
    networks:
      - ecom-network
    restart: on-failure

  product-service:
    build:
      context: ./product-service
    container_name: product-service
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - discovery-service
    networks:
      - ecom-network
    restart: on-failure

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    ports:
      - "8083:8083"
    depends_on:
      - mysql
      - discovery-service
    networks:
      - ecom-network
    restart: on-failure

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    ports:
      - "8084:8084"
    depends_on:
      - mysql
      - discovery-service
    networks:
      - ecom-network
    restart: on-failure

  payment-service:
    build:
      context: ./payment-service
    container_name: payment-service
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    ports:
      - "8085:8085"
    depends_on:
      - mysql
      - discovery-service
    networks:
      - ecom-network
    restart: on-failure

volumes:
  mysql-data:

networks:
  ecom-network:
    driver: bridge
